name: Release

on:
  workflow_dispatch:
    inputs:
      publish_npm:
        description: Publish the npm package from packages/core
        required: true
        default: true
        type: boolean
      publish_vscode:
        description: Publish the VS Code extension from packages/vscode
        required: true
        default: true
        type: boolean

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
          scope: "@zivex"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace
        run: pnpm build

      - name: Publish npm package
        if: ${{ inputs.publish_npm }}
        working-directory: packages/core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish

      - name: Publish VS Code extension
        if: ${{ inputs.publish_vscode }}
        working-directory: packages/vscode
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: pnpm exec vsce publish -p "$VSCE_PAT"
